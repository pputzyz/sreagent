# =============================================================================
# SREAgent 应用 Secret
# 仅存储启动必需的敏感配置：数据库密码、Redis 密码、JWT Secret、加密主密钥
# AI 和 Lark Bot 配置已移至数据库，通过 Web UI → Settings 页面配置
# 生产环境推荐使用 Sealed Secrets / External Secrets Operator
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: sreagent-secret
  namespace: sreagent
  labels:
    app: sreagent
type: Opaque
stringData:
  # 数据库密码（对应 SREAGENT_DATABASE_PASSWORD）
  # 必须与 mysql/secret.yaml 中的 password 字段一致
  # ⚠ 使用 kubectl create secret 或 Sealed Secrets 注入，不要提交真实密码到 git
  db-password: "CHANGE_ME"

  # Redis 密码（对应 SREAGENT_REDIS_PASSWORD）
  # 必须与 redis/secret.yaml 中的 password 字段一致
  # ⚠ 使用 kubectl create secret 或 Sealed Secrets 注入，不要提交真实密码到 git
  redis-password: "CHANGE_ME"

  # JWT 签名密钥（对应 SREAGENT_JWT_SECRET）
  # ⚠ 必须替换：运行 `openssl rand -hex 32` 并将输出（64位小写十六进制）填入
  # 示例格式（请勿直接使用）：a3f5c2d1e8b4a7f9c0d2e5b8a1f3c6d9e2b5a8f1c4d7e0b3a6f9c2d5e8b1a4f7
  jwt-secret: "CHANGE_ME"

  # 敏感字段 AES-256-GCM 加密主密钥（对应 SREAGENT_SECRET_KEY）
  # ⚠ 必须替换：运行 `openssl rand -hex 32` 并将输出（64位小写十六进制）填入
  # 值只能包含 0-9 和 a-f，共 64 个字符，否则服务启动报错并降级为明文存储
  # 示例格式（请勿直接使用）：f7d2c9b4e1a6f3c8d5b2e9a4f1c6d3b8e5a2f9c4d1b6e3a8f5c2d9b4e7a1f6c3
  secret-key: "CHANGE_ME"
