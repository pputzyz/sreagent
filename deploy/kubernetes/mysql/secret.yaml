# =============================================================================
# MySQL Secret
# ⚠ 不要提交真实密码到 git！使用以下方式之一注入：
#   1. kubectl create secret generic mysql-secret --from-literal=...
#   2. Sealed Secrets / External Secrets Operator
# 生成 base64: echo -n 'your_password' | base64
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: sreagent
  labels:
    app: mysql
type: Opaque
stringData:
  # 直接写明文，K8s 会自动 base64 编码存储
  root-password: "CHANGE_ME"
  username: "sreagent"
  password: "CHANGE_ME"
  database: "sreagent"
