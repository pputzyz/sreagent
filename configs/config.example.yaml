# SREAgent Platform Configuration
# ============================================================
# This file contains ONLY the settings required to start the
# server process.  All other platform settings (AI provider,
# Lark Bot credentials, etc.) are stored in the database and
# can be configured via the Web UI → Settings page.
#
# Copy this file to config.yaml and fill in the values.
# Sensitive values can also be set via environment variables
# (prefix SREAGENT_, e.g. SREAGENT_DATABASE_PASSWORD).
# ============================================================

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"
  # Public URL used in notification links (optional, falls back to host:port)
  # external_base: "https://sreagent.example.com"

database:
  driver: "mysql"
  host: "127.0.0.1"
  port: 3306
  username: "sreagent"
  password: "change-me"          # override via SREAGENT_DATABASE_PASSWORD
  database: "sreagent"
  charset: "utf8mb4"
  max_idle_conns: 10
  max_open_conns: 100
  max_lifetime: 3600

redis:
  host: "127.0.0.1"
  port: 6379
  password: ""                   # override via SREAGENT_REDIS_PASSWORD
  db: 0
  pool_size: 100

jwt:
  secret: "change-me-in-production-please"   # override via SREAGENT_JWT_SECRET
  expire: 86400
  issuer: "sreagent"

log:
  level: "info"
  format: "json"
  output: "stdout"
  file: "logs/sreagent.log"

engine:
  enabled: true
  sync_interval: 30     # how often to sync alert rules from DB (seconds)
  per_datasource_eval: false  # per-datasource bucket evaluation (true = isolated per DS, false = legacy fan-out)
  # hash_ring_enabled: false  # distribute rules across instances via consistent hash ring (requires Redis)
  # hash_ring_replicas: 500   # virtual nodes per physical node in the hash ring
  # instance_id: ""           # unique instance ID (default: hostname:pid, set manually in multi-container deployments)

# Bearer token for /metrics endpoint (empty = open access)
# Legacy env var METRICS_TOKEN also works (SREAGENT_METRICS_TOKEN takes precedence).
# metrics_token: ""       # override via SREAGENT_METRICS_TOKEN

# Comma-separated list of allowed CORS origins
# Legacy env var CORS_ALLOWED_ORIGINS also works (SREAGENT_CORS_ALLOWED_ORIGINS takes precedence).
# cors_allowed_origins: "" # override via SREAGENT_CORS_ALLOWED_ORIGINS

# OIDC SSO (optional — leave enabled: false to use local auth only)
# oidc:
#   enabled: false
#   issuer_url: "https://keycloak.example.com/realms/sreagent"
#   client_id: "sreagent"
#   client_secret: ""              # override via SREAGENT_OIDC_CLIENT_SECRET
#   redirect_url: "https://sreagent.example.com/auth/oidc/callback"
#   scopes: ["openid", "profile", "email"]
#   role_claim: "realm_roles"      # JWT claim path for role extraction
#   role_mapping:                  # map IdP roles to SREAgent roles
#     sreagent-admin: admin
#     sreagent-lead: team_lead
#     sreagent-member: member
#   default_role: "viewer"         # role for unmapped users
#   auto_provision: true           # auto-create user on first OIDC login

# ============================================================
# AI, Lark Bot, and SMTP settings are NOT stored here.
# Configure them at runtime via: Web UI → Settings page
# ============================================================
