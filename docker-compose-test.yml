version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sreagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sreagent
      MYSQL_USER: sreagent
      MYSQL_PASSWORD: sreagent
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sreagent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.106.1
    container_name: sreagent-vm
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
    command:
      - --storageDataPath=/storage
      - --httpListenAddr=:8428
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8428/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
  vm_data:
