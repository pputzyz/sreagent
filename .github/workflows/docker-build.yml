name: Build & Push Docker Image

# PR / main push 跑 test + lint + typecheck；v* tag 额外构建镜像
on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: hero1221/sreagent

jobs:
  # ──────────────────────────────────────────────────────────
  # Job 1: Go 单元测试
  # ──────────────────────────────────────────────────────────
  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      # -race is mandatory: the Lark integration adds concurrent code paths
      # (token buckets, debounce timers, CardKit sequence, WS goroutines) —
      # removing race detection here hides exactly the bugs it would catch.
      - name: Run tests
        run: go test ./... -race -timeout 300s -count=1

  # ──────────────────────────────────────────────────────────
  # Job 1b: Go lint（独立 job，不阻塞测试）
  # ──────────────────────────────────────────────────────────
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=3m

  # ──────────────────────────────────────────────────────────
  # Job 2: 前端 TypeScript 类型检查
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run typecheck
        working-directory: web

  # ──────────────────────────────────────────────────────────
  # Job 3: 构建 linux/amd64 镜像并推送到 Docker Hub
  #         仅在 push v* tag 时执行（main 分支和 PR 只跑上面两个 job）
  #         标签策略：仅 :<version> + :latest（不再发布 :major / :major.minor）
  # ──────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [test, lint, typecheck]
    # 只在 tag push 时运行
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      # 使用 BuildKit（单架构构建也受益于缓存）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录 Docker Hub（job 已通过 if 保证只在 tag 时运行）
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 自动生成镜像标签：
      #   推 v1.2.3 tag → :v1.2.3, :latest  （保留 v 前缀）
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 使用 GitHub Actions 缓存加速二次构建（单架构用 min 即可）
          cache-from: type=gha
          cache-to: type=gha,mode=min
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}

      # 推送后在 Docker Hub 更新描述（可选）
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: README.md
        continue-on-error: true  # README 不存在时不中断流水线
