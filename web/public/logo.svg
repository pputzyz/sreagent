<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sreg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="0.5" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="sreh" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- rounded badge -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sreg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sreh)"/>
  <!-- subtle inner shadow -->
  <rect x="2" y="2" width="60" height="60" rx="14" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1"/>
  <!-- radar pulse rings -->
  <circle cx="32" cy="32" r="21" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.2"/>
  <circle cx="32" cy="32" r="14" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
  <!-- stylized S (SRE monogram) with glow -->
  <path d="M41 23 C41 18 36.5 16 32 16 C26.5 16 22 19 22 23 C22 27 26 29 32 30 C38 31 42 33 42 38 C42 43 37.5 46 32 46 C26.5 46 22 43 22 39"
        stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- alert accent dot with pulse feel -->
  <circle cx="49" cy="15" r="4" fill="#FBBF24" stroke="#ffffff" stroke-width="1.6"/>
  <circle cx="49" cy="15" r="4" fill="none" stroke="#FBBF24" stroke-opacity="0.3" stroke-width="3"/>
</svg>
