<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SREAgent 全功能复测</title><style>
:root{--bg:#0f1115;--panel:#171a21;--panel2:#1e222b;--border:#2a2f3a;--txt:#e6e9ef;--mut:#8b93a3;--pri:#3b82f6;--ok:#10b981;--fail:#ef4444;--pend:#64748b;--dettxt:#cdd3de}

*{box-sizing:border-box}body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt)}
header{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--border);padding:12px 18px}
.h-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}h1{font-size:16px;margin:0;font-weight:650}
.prog{flex:1;min-width:180px;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;display:flex}.prog i{display:block;height:100%}
.stat{font-size:12px;color:var(--mut);white-space:nowrap}.stat b{color:var(--txt)}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
select,input[type=search],button{background:var(--panel2);color:var(--txt);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:13px}
button{cursor:pointer}button:hover{border-color:var(--pri)}input[type=search]{min-width:180px;flex:1}
.btn-exp{background:var(--pri);border-color:var(--pri);color:#fff}
.wrap{padding:16px 18px;max-width:1100px;margin:0 auto}.dgroup{margin-bottom:26px}
.dh{font-size:15px;font-weight:650;padding:8px 0;border-bottom:2px solid var(--border);margin-bottom:6px;position:sticky;top:96px;background:var(--bg)}
.dh .c{font-size:12px;color:var(--mut);font-weight:400;margin-left:8px}
.sec{font-size:12px;color:var(--mut);font-weight:600;margin:14px 0 6px}
.card{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--pend);border-radius:9px;padding:10px 12px;margin-bottom:8px}
.card.pass{border-left-color:var(--ok)}.card.fail{border-left-color:var(--fail)}
.card-top{display:flex;gap:10px;align-items:flex-start}
.idtag{font:11px ui-monospace,monospace;color:var(--mut);background:var(--panel2);padding:2px 6px;border-radius:5px;white-space:nowrap}
.title{font-weight:550;flex:1}.scen{font-size:13px}
.acts{display:flex;gap:6px;flex-shrink:0}.acts button{padding:3px 9px;font-size:12px;border-radius:6px}
.acts .a-pass.on{background:var(--ok);border-color:var(--ok);color:#fff}
.acts .a-fail.on{background:var(--fail);border-color:var(--fail);color:#fff}
.acts .a-todo.on{background:var(--pend);border-color:var(--pend);color:#fff}
.det{margin:8px 0 0;padding:8px 10px;background:var(--panel2);border-radius:7px;font-size:13px;color:var(--dettxt);display:none}
.det.show{display:block}.det div{margin:2px 0}.det .k{color:var(--mut)}
.toggle{font-size:12px;color:var(--pri);cursor:pointer;user-select:none;margin-top:4px;display:inline-block}
.note{width:100%;margin-top:8px;background:var(--panel2);border:1px solid var(--border);border-radius:7px;color:var(--txt);padding:6px 9px;font:13px sans-serif;resize:vertical;display:none}
.note.show{display:block}.empty{color:var(--mut);text-align:center;padding:40px}
</style></head><body data-theme="dark">
<header><div class="h-row"><h1>SREAgent 全功能复测</h1><div class="prog" id="prog"></div><div class="stat" id="stat"></div><button id="btnTheme">🌙 暗色</button></div>
<div class="controls"><select id="fDomain"><option value="">全部域</option></select><select id="fStatus"><option value="">全部状态</option><option value="todo">待测</option><option value="pass">通过</option><option value="fail">不通过</option></select><select id="fScen"><option value="">全部场景</option><option value="✅">✅正常</option><option value="🔸">🔸边界</option><option value="⚠️">⚠️异常</option><option value="🈳">🈳空态</option><option value="🔐">🔐权限</option></select><input type="search" id="fSearch" placeholder="搜索编号/标题…"><button id="btnExp">展开详情</button><button id="btnCol">收起</button><button class="btn-exp" id="btnCsv">导出结果CSV</button><button id="btnReset">重置</button></div></header>
<div class="wrap" id="wrap"></div><script>

lder 对应变化。"]},{"domain":"T1","section":"新建规则（RuleFormModal）","scen":"","id":"T1-26","title":"🔸for_duration 格式","details":["步骤：1)填 `5m`/`1h30m`/`30s` 保存 2)再填 `abc`/`5` 保存","预期：合法 Go duration 保存成功；非法值后端返回 10001「for_duration must be a valid Go duration」。"]},{"domain":"T1","section":"新建规则（RuleFormModal）","scen":"","id":"T1-27","title":"严重度选择","details":["步骤：1)切换 critical(P0-P1)/warning(P2)/info(P3-P4)","预期：保存后列表圆点颜色对应（critical 红 / warning 黄 / info 蓝）。"]},{"domain":"T1","section":"新建规则（RuleFormModal）","scen":"","id":"T1-28","title":"🔸名称超长/特殊字符","details":["步骤：1)名称填 1000 字或含中文/emoji/引号","预期：按后端列宽限制处理，成功或返回 DB 错误而非崩溃。"]},{"domain":"T1","section":"新建规则（RuleFormModal）","scen":"","id":"T1-29","title":"分组名/分组等待/分组间隔","details":["步骤：1)基本信息区填 group_name、group_wait(0-3600s)、group_interval(0-86400s)","预期：边界外被 InputNumber min/max 钳制；保存后回显一致。"]},{"domain":"T1","section":"新建规则（RuleFormModal）","scen":"","id":"T1-30","title":"分类 tag 可自定义","details":["步骤：1)分类下拉输入不存在的值并回车","预期：filterable+tag 允许自定义分类，保存后侧栏新增该分类。"]},{"domain":"T1","section":"表达式测试与图形预览","scen":"","id":"T1-31","title":"✅测试表达式","details":["步骤：1)选数据源+填表达式 2)点「测试表达式」","预期：300ms 防抖后调用 query；返回 series 列表（标签+值）或日志匹配数或「无结果」。"]},{"domain":"T1","section":"表达式测试与图形预览","scen":"","id":"T1-32","title":"测试按钮禁用条件","details":["步骤：1)未选数据源或表达式空","预期：「测试表达式」「预览图形」均禁用。"]},{"domain":"T1","section":"表达式测试与图形预览","scen":"","id":"T1-33","title":"⚠️测试表达式失败","details":["步骤：1)填非法 PromQL 点测试","预期：message.error 显示后端错误信息，不崩溃。"]},{"domain":"T1","section":"表达式测试与图形预览","scen":"","id":"T1-34","title":"✅图形预览抽屉","details":["步骤：1)点「预览图形」","预期：右侧抽屉打开，折线图 + 图例表（series/min/max/avg/last）；可切时间范围 15m/1h/6h/24h 重新拉取（step 自适应）。"]},{"domain":"T1","section":"表达式测试与图形预览","scen":"","id":"T1-35","title":"🈳图形无数据","details":["步骤：1)表达式无返回序列点预览","预期：抽屉显示「无数据」，不报错。"]},{"domain":"T1","section":"标签与注解 / 高级设置","scen":"","id":"T1-36","title":"标签 KV 编辑与自动补全","details":["步骤：1)展开标签区 2)新增标签，key 输入触发补全","预期：key 候选来自 label registry（按当前数据源），选 key 后拉取对应 value 候选。"]},{"domain":"T1","section" urrentOnCallUser 失败/为空时跳过），不应导致引擎崩溃；记录是否有悬空引用。"]},{"domain":"T4","section":"子功能 13：跨域 / 数据一致性","scen":"","id":"T4-109","title":"🔸 排班与团队解绑后值班解析","details":["路径：排班关联团队被删","步骤：1) 排班 team_id 指向已删团队 2) 查看详情","预期：配置 tab 团队显示\"—\"，不报错。"]},{"domain":"T4","section":"子功能 13：跨域 / 数据一致性","scen":"","id":"T4-110","title":"🔐 admin vs team_lead 可见范围","details":["路径：排班列表 / 升级策略列表","步骤：1) team_lead 登录查看","预期：确认列表是否按团队范围过滤还是全量（当前后端 List 默认不强制团队隔离，记录实际可见范围与是否符合预期）。"]},{"domain":"T5","section":"T5.1 静默规则 — 列表页加载与空态","scen":"","id":"T5-1","title":"静默规则列表正常加载与渲染","details":["路径：告警 → 静默与抑制 → 静默规则（`/alert/suppression`）","步骤：1) 以 admin 登录 2) 进入页面 3) 观察列表","预期：调用 `GET /mute-rules?page=1&page_size=200`，每条规则卡片显示状态点、状态文案、名称、匹配标签 chip、调度信息（一次性 起→止 / 周期 描述 / 无调度）、命中次数、剩余/启动倒计时；未启用规则卡片半透明（data-dim）。"]},{"domain":"T5","section":"T5.1 静默规则 — 列表页加载与空态","scen":"","id":"T5-2","title":"静默规则空态展示","details":["路径：`/alert/suppression`","步骤：1) 在无任何静默规则的环境登录 2) 进入页面","预期：显示 EmptyState（图标+「暂无数据」标题+副标题），并有「创建第一条」主按钮，点击后打开创建弹窗。"]},{"domain":"T5","section":"T5.1 静默规则 — 列表页加载与空态","scen":"","id":"T5-3","title":"列表加载中骨架屏","details":["路径：`/alert/suppression`","步骤：1) 限速网络下进入页面","预期：首次加载（filteredRules 为空时）显示 6 行 row 变体的 LoadingSkeleton，加载完成后替换为真实列表。"]},{"domain":"T5","section":"T5.1 静默规则 — 列表页加载与空态","scen":"","id":"T5-4","title":"列表加载失败提示","details":["路径：`/alert/suppression`","步骤：1) 后端返回 500 或断网 2) 进入页面","预期：弹出 error message（getErrorMessage 文案），列表保持空态，不白屏。"]},{"domain":"T5","section":"T5.1 静默规则 — 列表页加载与空态","scen":"","id":"T5-5","title":"刷新按钮","details":["路径：`/alert/suppression` 顶部操作区","步骤：1) 点击「刷新」 2) 观察按钮状态","预期：按钮进入 loading，重新拉取列表，数据更新；多次连点不报错。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-6","title":"状态筛选 - 全部/活跃/计划/过期/已禁用","details":["路径：`/alert/suppression` 工具栏 RadioGroup","步骤：1) 依次点击 全部 / 活跃(active) / 计划(future) / 过期(expired) / 已禁用(disabled)","预期：active 仅显示 isActiveNow=true；future 仅显示一次性且 start_time>now 且启用；expired 仅显示一次性且 end_time<now；disabled 仅显示 is_enabled=false；切换后分页重置到第 1 页。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-7","title":"类型筛选 - 全部/一次性/周期","details":["路径：`/alert/suppression` 工具栏类型下拉","步骤：1) 选择「一次性」 2) 选择「周期」 3) 选回「全部」","预期：一次性仅显示同时有 start_time+end_time 的规则；周期仅显示同时有 periodic_start+periodic_end 的规则；既无两者也无的「unknown」规则在一次性/周期下都不显示。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-8","title":"关键字搜索（名称+描述）","details":["路径：`/alert/suppression` 搜索框","步骤：1) 输入存在的名称片段 2) 输入只在描述中出现的片段 3) 输入大写","预期：按 name 和 description 做大小写不敏感包含匹配；命中条目实时过滤；搜索后分页回到第 1 页。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-9","title":"搜索无结果空态","details":["路径：`/alert/suppression` 搜索框","步骤：1) 输入不存在的字符串「zzzqqq不存在」","预期：列表过滤为 0 条，显示 EmptyState（noData 标题），清空搜索后恢复。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-10","title":"搜索特殊字符不报错","details":["路径：`/alert/suppression` 搜索框","步骤：1) 输入 `%_'\"<script>` 等特殊字符","预期：前端仅做字符串包含，无异常、无注入，命中 0 条显示空态。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-11","title":"筛选+搜索组合","details":["路径：`/alert/suppression`","步骤：1) 选「已禁用」+ 类型「周期」+ 关键字","预期：三个条件取交集；结果正确，分页重置。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-12","title":"分页展示与跳转","details":["路径：`/alert/suppression`","步骤：1) 制造 >20 条过滤后规则 2) 观察分页器 3) 用快速跳页输入页码","预期：每页 20 条；仅当 totalFiltered>pageSize 时显示分页器；支持 quick-jumper 跳页；翻页内容正确。"]},{"domain":"T5","section":"T5.2 静默规则 — 过滤/搜索/分页","scen":"","id":"T5-13","title":"列表上限 200 条","details":["路径：`/alert/suppression`","步骤：1) 环境存在 >200 条静默规则","预期：前端只请求 page_size=200，超出部分不展示（已知限制，确认不报错即可）。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-14","title":"创建一次性静默规则（正常路径）","details":["路径：`/alert/suppression` → 点击「创建」","步骤：1) 填名称 2) 添加至少一个匹配标签（如 `env=prod`）3) 选开始时间、结束时间（结束>开始）4) 开启状态开关 5) 保存","预期：`POST /mute-rules` 成功，提示「已创建」，弹窗关闭，列表刷新出现新规则；调度区显示「一次性 起→止」。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-15","title":"名称必填校验（前端）","details":["路径：创建弹窗","步骤：1) 名称留空 2) 点保存","预期：前端 `handleSave` 拦截，warning「名称必填」（mute.nameRequired），不发请求。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-16","title":"无任何匹配条件被后端拒绝","details":["路径：创建弹窗","步骤：1) 只填名称，不加 match_labels、不选 severities、rule_ids 留空 2) 选时间窗 3) 保存","预期：后端 `validateMuteRuleRequest` 返回 10001「must specify at least one of: match_labels, severities, rule_ids」，前端 error message，不创建（避免「静默全部告警」）。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-17","title":"结束时间早于/等于开始时间","details":["路径：创建弹窗","步骤：1) 加匹配标签 2) 开始时间晚于结束时间（或相等）3) 保存","预期：后端 `validateMuteTimeWindow` 返回「end_time must be after start_time」，error message，不创建。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-18","title":"只填开始时间不填结束时间","details":["路径：创建弹窗","步骤：1) 加匹配标签 2) 只选 start_time 3) 保存","预期：通过校验保存（hasOneTime 成立但 end 为空时不触发 after 校验）；列表中该规则一次性窗口显示开始时间→空，确认不崩。（边界行为记录）"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-19","title":"一次性 + 周期同时填写互斥","details":["路径：创建弹窗","步骤：1) 加匹配标签 2) 同时选 start_time/end_time 且填 periodic_start/periodic_end 3) 保存","预期：后端返回「cannot specify both one-time and periodic windows」，error message，不创建。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-20","title":"severities 多选作为匹配条件","details":["路径：创建弹窗 → 严重等级多选","步骤：1) 名称 2) 只选 critical+warning（不加 match_labels）3) 选时间窗 4) 保存","预期：severities 以逗号拼接 `critical,warning` 提交，校验通过（severities 非空满足条件），创建成功。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-21","title":"名称超长边界","details":["路径：创建弹窗","步骤：1) 名称输入 255+ 字符 2) 保存","预期：要么前端/DB 接受并正确截断/存储，要么返回明确错误；不静默失败、不前端崩溃。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-22","title":"名称/描述特殊字符与 emoji","details":["路径：创建弹窗","步骤：1) 名称含 `<b>&\"'` 与 emoji 2) 保存 3) 回列表查看","预期：原样存储与展示，无 XSS（chip/名称按文本渲染），无乱码。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-23","title":"rule_ids 字段合法/非法","details":["路径：创建弹窗 → 规则 ID 输入框","步骤：1) 输入 `1,2,3` 保存（合法）2) 另建一条输入 `abc` 或 `0` 保存（非法）","预期：合法 CSV 创建成功；非法（非正整数/0）后端 `validateRuleIDs` 返回「invalid rule_id」错误，不创建。"]},{"domain":"T5","section":"T5.3 静默规则 — 创建（一次性）","scen":"","id":"T5-24","title":"is_enabled 创建时为关","details":["路径：创建弹窗","步骤：1) 关闭状态开关 2) 填合法条件 3) 保存","预期：创建后 is_enabled=false，卡片半透明、状态显示「已禁用」。（Create 路径默认 false）"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-25","title":"创建周期静默（正常路径）","details":["路径：创建弹窗 → 周期静默区","步骤：1) 名称+匹配标签 2) periodic_start=09:00、periodic_end=18:00 3) 勾选工作日 周一~周五 4) 时区 Asia/Shanghai 5) 保存","预期：days_of_week 提交为 `1,2,3,4,5`，创建成功；调度区显示「周期 周一/.../周五 09:00 - 18:00 (Asia/Shanghai)」。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-26","title":"周期跨夜窗口","details":["路径：创建弹窗","步骤：1) periodic_start=22:00、periodic_end=06:00 2) 保存","预期：跨夜窗口被允许（start>end 合法），创建成功；isActiveNow 在该窗口内（含跨午夜）判定为活跃。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-27","title":"周期起止相等被拒绝","details":["路径：创建弹窗","步骤：1) periodic_start=09:00、periodic_end=09:00 2) 保存","预期：后端返回「periodic_start and periodic_end must not be equal」，不创建。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-28","title":"不选星期（每日）","details":["路径：创建弹窗","步骤：1) 填周期时间但不勾选任何星期 2) 保存","预期：days_of_week 为空，调度描述显示「每日（daily）」，每天该时间窗均静默。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-29","title":"days_of_week 非法值（后端边界）","details":["路径：API（通过构造请求或 AI 生成异常数据）","步骤：1) 提交 days_of_week=`8` 或 `0`（注意：前端星期日用 `0`，后端校验要求 1-7）","预期：后端 `validateDaysOfWeek` 仅接受 1-7，`0`/`8` 返回「days_of_week must be 1-7」错误。**注意校验前端勾选周日(value=0)时是否与后端冲突 —— 重点验证周日勾选能否保存成功。**"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-30","title":"时区选择与 filterable","details":["路径：创建弹窗 → 时区下拉","步骤：1) 输入关键字过滤时区 2) 选 America/New_York 3) 保存","预期：可过滤、可选，提交对应时区；调度描述带该时区。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","scen":"","id":"T5-31","title":"非法时区被拒绝","details":["路径：API","步骤：1) 提交 timezone=`Mars/Phobos`","预期：后端 `time.LoadLocation` 失败，返回「invalid timezone」错误，不创建。"]},{"domain":"T5","section":"T5.4 静默规则 — 创建（周期）","sce "","id":"T6-16","title":"⚠️ endpoint 含内嵌凭据","details":["步骤：endpoint 填 `http://user:pass@host:9090`","预期：拒绝，提示不允许内嵌 username:password，应使用 auth_type/auth_config。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-17","title":"✅ 私网 IP 允许","details":["步骤：endpoint 填 `http://10.0.0.5:9090` 或 `192.168.x.x`","预期：通过校验（RFC1918 私网允许，运行时由 safehttp 处理）。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-18","title":"✅ Basic 鉴权","details":["步骤：鉴权类型选 Basic → 出现用户名/密码字段 → 填写 → 创建","预期：auth_config 以 `{username,password}` JSON 构造并加密存储；密码框 type=password、点击可显示。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-19","title":"✅ Bearer 鉴权","details":["步骤：鉴权选 Bearer → 出现 Token 字段 → 填写 → 创建","预期：auth_config 为 `{token}`，加密存储。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-20","title":"✅ API Key 鉴权","details":["步骤：鉴权选 API Key → 出现 Header(默认 X-API-Key) + Value 字段 → 填写 → 创建","预期：auth_config 包含 header+value（注意：保存时前端用 `value` 字段、测试连接时用 `key` 字段——核对鉴权是否生效）。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-21","title":"鉴权方式切换字段联动","details":["步骤：在 none/basic/bearer/api_key 间反复切换","预期：仅显示对应鉴权方式的输入字段；其余隐藏。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-22","title":"🔸 健康检查间隔边界","details":["步骤：健康检查间隔输入 9、10、3600、3601、负数、空","预期：NInputNumber 限制 min=10 max=3600，超界被钳制。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-23","title":"启用开关默认值","details":["步骤：新建时观察\"启用\"开关","预期：默认开启(is_enabled=true)；关闭后创建则数据源禁用。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-24","title":"标签 KV 编辑器","details":["路径：新建弹窗 → 标签区","步骤：添加多组 key/value 标签；删除某组；留空","预期：通过 KVEditor 增删；保存为 labels map；空标签不报错。"]},{"domain":"T6","section":"T6.2 数据源 — 新建（表单 + 各类型 + 各鉴权方式）","scen":"","id":"T6-25","title":"🔸 名称/描述超长与特殊字符","details":["步骤：名称填 200+ 字符、含 emoji/中文/引号；描述填多行","预期：可提交或被后端长度限制；特殊字符不破坏列表/ const KEY='sreagent-retest-v1', TKEY='sreagent-retest-theme';
let state=JSON.parse(localStorage.getItem(KEY)||'{}');
const $=s=>document.querySelector(s);
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
const THEMES=['dark','light','sepia'],TLABEL={dark:'🌙 暗色',light:'☀️ 亮色',sepia:'📜 护眼'};
function applyTheme(t){document.body.dataset.theme=t;localStorage.setItem(TKEY,t);$('#btnTheme').textContent=TLABEL[t]}
function cycleTheme(){const cur=document.body.dataset.theme||'dark';applyTheme(THEMES[(THEMES.indexOf(cur)+1)%THEMES.length])}
function setStatus(id,s){const c=state[id]||{};c.status=(c.status===s?'':s);state[id]=c;save();render();updateBar()}
function setNote(id,v){const c=state[id]||{};c.note=v;state[id]=c;save();updateBar()}
function expandAll(o){document.querySelectorAll('.det,.note').forEach(e=>e.classList.toggle('show',!!o))}
function updateBar(){let pass=0,fail=0,todo=0;DATA.items.forEach(i=>{const s=(state[i.id]||{}).status;if(s==='pass')pass++;else if(s==='fail')fail++;else todo++});const t=DATA.total;$('#prog').innerHTML='<i style="width:'+(pass/t*100)+'%;background:var(--ok)"></i><i style="width:'+(fail/t*100)+'%;background:var(--fail)"></i>';$('#stat').innerHTML='<b>'+pass+'</b> 通过 · <b style="color:var(--fail)">'+fail+'</b> 不通过 · <b>'+todo+'</b> 待测 · 共 '+t}
function passFilters(i){const fd=$('#fDomain').value,fs=$('#fStatus').value,fc=$('#fScen').value,q=$('#fSearch').value.trim().toLowerCase();if(fd&&i.domain!==fd)return false;const st=(state[i.id]||{}).status||'todo';if(fs&&st!==fs)return false;if(fc&&!(i.scen||'').includes(fc))return false;if(q&&!((i.id+' '+i.title).toLowerCase().includes(q)))return false;return true}
function render(){const wrap=$('#wrap');wrap.innerHTML='';let shown=0;
 DATA.domains.forEach(d=>{const its=DATA.items.filter(i=>i.domain===d&&passFilters(i));if(!its.length)return;shown+=its.length;
  const g=document.createElement('div');g.className='dgroup';g.innerHTML='<div class="dh">'+d+' '+(DATA.labels[d]||'')+'<span class="c">'+its.length+' 项</span></div>';let lastSec=null;
  its.forEach(i=>{if(i.section!==lastSec){const s=document.createElement('div');s.className='sec';s.textContent=i.section||'';g.appendChild(s);lastSec=i.section}
   const st=state[i.id]||{};const cs=st.status||'';const c=document.createElement('div');c.className='card'+(cs?' '+cs:'');c.dataset.id=i.id;
   const det=i.details.map(x=>{const mm=x.match(/^(路径|步骤|预期)[：:]\s*(.*)/);return mm?'<div><span class="k">'+mm[1]+'：</span>'+esc(mm[2])+'</div>':'<div>'+esc(x)+'</div>'}).join('');
   c.innerHTML='<div class="card-top"><span class="scen">'+(i.scen||'')+'</span><span class="idtag">'+esc(i.id)+'</span><span class="title">'+esc(i.title)+'</span><span class="acts"><button class="a-pass'+(cs==='pass'?' on':'')+'" data-act="pass">通过</button><button class="a-fail'+(cs==='fail'?' on':'')+'" data-act="fail">不通过</button><button class="a-todo'+(cs===''?' on':'')+'" data-act="todo">待测</button></span></div><span class="toggle" data-act="toggle">详情/备注 ▾</span><div class="det'+(st.note?' show':'')+'">'+det+'</div><textarea class="note'+(st.note?' show':'')+'" placeholder="备注（失败现象/说明…）">'+esc(st.note||'')+'</textarea>';
   g.appendChild(c)});
  wrap.appendChild(g)});
 if(!shown)wrap.innerHTML='<div class="empty">无匹配用例</div>'}
$('#wrap').addEventListener('click',e=>{const c=e.target.closest('.card');if(!c)return;const id=c.dataset.id;const act=e.target.dataset.act;if(act==='pass'||act==='fail')setStatus(id,act);else if(act==='todo')setStatus(id,'');else if(act==='toggle'){c.querySelector('.det').classList.toggle('show');c.querySelector('.note').classList.toggle('show')}});
$('#wrap').addEventListener('input',e=>{if(e.target.classList.contains('note')){const c=e.target.closest('.card');setNote(c.dataset.id,e.target.value)}});
function exportCSV(){let rows=[['编号','场景','域','子功能','标题','状态','备注']];DATA.items.forEach(i=>{const s=state[i.id]||{};rows.push([i.id,i.scen||'',i.domain,i.section||'',i.title,({pass:'通过',fail:'不通过'})[s.status]||'待测',s.note||''])});const csv='\ufeff'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\r\n');const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='复测结果.csv';a.click()}
